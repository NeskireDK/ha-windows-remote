name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install homeassistant ruff

      - name: Lint with Ruff
        run: ruff check custom_components/

      - name: Check manifest
        run: python -c "import json; m = json.load(open('custom_components/pc_remote/manifest.json')); assert m['domain'] == 'pc_remote'"

      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-homeassistant-custom-component wakeonlan==3.1.0

      - name: Run tests with coverage
        run: pytest tests/ --cov=custom_components/pc_remote --cov-report=term-missing --cov-report=html:coverage-report --cov-report=xml:coverage.xml --junitxml=test-results.xml

      - name: Test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results.xml

      - name: Coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          format: markdown
          output: both

      - name: Add coverage to PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: code-coverage-results.md

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
